<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Actualizar contraseña</title>
    <link rel="stylesheet" href="./css/global.css?v=20260611-density-pass1" />
    <link rel="stylesheet" href="./css/pages/reset-password.css?v=20260610-css-split1" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-card">
        <a class="login-brand" href="./index.html" aria-label="Ir al Home">
          <img class="brand-logo" src="./assets/logo-lang-white.png" alt="LANG" />
        </a>
        <p class="eyebrow">Acceso</p>
        <h1>Actualizar contraseña</h1>
        <form class="login-form" id="resetForm">
          <label>Correo de acceso<input id="resetEmailInput" autocomplete="email" required type="email" /></label>
          <label>Nueva contraseña<input id="newPasswordInput" autocomplete="new-password" required type="password" /></label>
          <button class="primary-button full" type="submit">Actualizar</button>
        </form>
        <div class="login-links">
          <a href="./login.html">Volver al acceso</a>
        </div>
        <p class="muted login-help">En producción este flujo enviará un enlace seguro por correo.</p>
      </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./api-client.js?v=20260610-arch1"></script>
    <script src="./shared-data.js?v=20260610-opcats1"></script>
    <script src="./auth-session.js?v=20260610-arch1"></script>
    <script src="./reset-password.js?v=20260608-mail-identity2"></script>
  </body>
</html>
