<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ingreso por primera vez</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const embedded = window.self !== window.top || params.get("embedded") === "1";
        if (!embedded) return;
        const theme = params.get("theme") === "light" ? "light" : "dark";
        document.documentElement.classList.add("rrhh-embedded-root", `rrhh-parent-theme-${theme}`);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="./css/global.css?v=20260704-prepaint2" />
    <link rel="stylesheet" href="./css/pages/reset-password.css?v=20260610-css-split1" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-card">
        <a class="login-brand" href="./index.html" aria-label="Ir al Home">
          <img class="brand-logo" src="./assets/logo-lang-white.png" alt="LANG" />
        </a>
        <p class="eyebrow">Primer acceso</p>
        <h1>Ingreso por primera vez</h1>
        <form class="login-form" id="resetForm">
          <label>Mail<input id="resetEmailInput" autocomplete="email" required type="email" /></label>
          <label>Contraseña<input id="newPasswordInput" autocomplete="new-password" required minlength="8" type="password" /></label>
          <label>Verificar contraseña<input id="confirmPasswordInput" autocomplete="new-password" required minlength="8" type="password" /></label>
          <label>Código de seguridad<input id="securityCodeInput" autocomplete="one-time-code" required type="text" /></label>
          <button class="primary-button full" type="submit">Dar de alta contraseña</button>
        </form>
        <div class="login-links">
          <a href="/login">Volver al acceso</a>
        </div>
        <p class="muted login-help">Usá el mail cargado por RRHH y el código recibido por privado.</p>
      </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./api-client.js?v=20260704-sso1"></script>
    <script src="./shared-data.js?v=20260610-opcats1"></script>
    <script src="./auth-session.js?v=20260704-sso1"></script>
    <script src="./reset-password.js?v=20260701-first-access1"></script>
  </body>
</html>
