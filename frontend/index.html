<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home - Sistema de personal</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const embedded = window.self !== window.top || params.get("embedded") === "1";
        if (!embedded) return;
        const theme = params.get("theme") === "light" ? "light" : "dark";
        document.documentElement.classList.add("rrhh-embedded-root", `rrhh-parent-theme-${theme}`);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="./css/global.css?v=20260704-prepaint2" />
    <link rel="stylesheet" href="./css/pages/index.css?v=20260610-css-split1" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-heading">
        <a class="brand-home" href="./index.html" aria-label="Ir al Home">
          <img class="brand-logo" src="./assets/logo-lang-white.png" alt="LANG" />
        </a>
        <div>
        <p class="eyebrow">Sistema de gestión de personal</p>
        <h1>Home</h1>
        </div>
      </div>
      <div class="top-actions" id="sessionActions"></div>
    </header>

    <main class="home-shell">
      <section class="home-grid" id="homeGrid"></section>
    </main>

    <script src="./api-client.js?v=20260704-sso1"></script>
    <script src="./shared-data.js?v=20260702-observaciones1"></script>
    <script src="./auth-session.js?v=20260704-sso1"></script>
    <script src="./home.js?v=20260702-observaciones1"></script>
  </body>
</html>
