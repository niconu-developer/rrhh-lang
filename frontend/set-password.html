<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Definir contraseña</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const embedded = window.self !== window.top || params.get("embedded") === "1";
        if (!embedded) return;
        const theme = params.get("theme") === "light" ? "light" : "dark";
        document.documentElement.classList.add("rrhh-embedded-root", `rrhh-parent-theme-${theme}`);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="./css/global.css?v=20260704-prepaint2" />
    <link rel="stylesheet" href="./css/pages/reset-password.css?v=20260701-access-link1" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-card">
        <a class="login-brand" href="./index.html" aria-label="Ir al Home">
          <img class="brand-logo" src="./assets/logo-lang-white.png" alt="LANG" />
        </a>
        <p class="eyebrow">Primer acceso</p>
        <h1>Definir contraseña</h1>
        <p class="muted login-help" id="setPasswordInfo">Validando link...</p>
        <form class="login-form hidden" id="setPasswordForm">
          <label>Nueva contraseña<input id="setPasswordInput" autocomplete="new-password" required type="password" minlength="8" /></label>
          <label>Repetir contraseña<input id="setPasswordConfirmInput" autocomplete="new-password" required type="password" minlength="8" /></label>
          <button class="primary-button full" type="submit">Guardar contraseña</button>
        </form>
        <div class="login-links">
          <a href="/login">Volver al acceso</a>
        </div>
      </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./api-client.js?v=20260704-sso1"></script>
    <script src="./set-password.js?v=20260701-access-link1"></script>
  </body>
</html>
