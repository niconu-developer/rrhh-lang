<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceso - Sistema de personal</title>
    <link rel="stylesheet" href="./css/global.css?v=20260611-density-pass1" />
    <link rel="stylesheet" href="./css/pages/login.css?v=20260610-css-split1" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-card">
        <a class="login-brand" href="./index.html" aria-label="Ir al Home">
          <img class="brand-logo" src="./assets/logo-lang-white.png" alt="LANG" />
        </a>
        <p class="eyebrow">Sistema de personal</p>
        <h1>Acceso</h1>
        <form class="login-form" id="loginForm">
          <label>Correo<input id="emailInput" autocomplete="email" required type="email" /></label>
          <label>Contraseña<input id="passwordInput" autocomplete="current-password" required type="password" /></label>
          <button class="primary-button full" type="submit">Ingresar</button>
        </form>
        <div class="login-links">
          <a href="./reset-password.html">Actualizar contraseña</a>
          <a href="./reloj-facial.html">Reloj facial</a>
        </div>
      </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./api-client.js?v=20260610-arch1"></script>
    <script src="./shared-data.js?v=20260610-opcats1"></script>
    <script src="./auth-session.js?v=20260611-sso1"></script>
    <script src="./login.js?v=20260611-sso1"></script>
  </body>
</html>
