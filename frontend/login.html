<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceso - Sistema de personal</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const embedded = window.self !== window.top || params.get("embedded") === "1";
        if (!embedded) return;
        const theme = params.get("theme") === "light" ? "light" : "dark";
        document.documentElement.classList.add("rrhh-embedded-root", `rrhh-parent-theme-${theme}`);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="./css/global.css?v=20260704-prepaint2" />
    <link rel="stylesheet" href="./css/pages/login.css?v=20260610-css-split1" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-card">
        <a class="login-brand" href="./index.html" aria-label="Ir al Home">
          <img class="brand-logo" src="./assets/logo-lang-white.png" alt="LANG" />
        </a>
        <p class="eyebrow">Sistema de personal</p>
        <h1>Redirigiendo</h1>
        <p>Entrá desde el acceso principal de LANG.</p>
      </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./api-client.js?v=20260704-sso1"></script>
    <script src="./shared-data.js?v=20260610-opcats1"></script>
    <script src="./auth-session.js?v=20260704-sso1"></script>
    <script src="./login.js?v=20260704-sso1"></script>
  </body>
</html>
